name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Torch CPU-only : la roue CUDA par défaut fait exploser le temps
      # d'install et le cache (tout tourne en CPU dans ce projet).
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: make lint

      - name: Tests unitaires
        run: make test
