services:

  # ──────────────────────────────────────────────────────────────────
  # LLM local — Ollama (Gemma 4 E4B)
  # Entrypoint custom : vérifie si le modèle est déjà dans le volume,
  # le télécharge si nécessaire, puis sert l'API.
  # ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    volumes:
      - models_cache:/root/.ollama
      - ./scripts/ollama_entrypoint.sh:/ollama_entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/ollama_entrypoint.sh"]
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      # Fenêtre de contexte par défaut des modèles chargés. Sans ça, Ollama
      # tronque silencieusement le prompt (~4k tokens) — fatal pour du RAG
      # qui injecte des sections entières.
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-8192}
    expose:
      - "11434"
    healthcheck:
      # Le CLI ollama sert de sonde (l'image n'embarque pas curl) ;
      # healthy = le modèle attendu est bien chargé dans le volume.
      test: ["CMD-SHELL", "ollama list | grep -q \"$${OLLAMA_MODEL}\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s   # 10 min pour le premier téléchargement
    restart: unless-stopped
    networks:
      - rag_network
      - internal

  # ──────────────────────────────────────────────────────────────────
  # Backend FastAPI
  # ──────────────────────────────────────────────────────────────────
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: rag-agent-api
    ports:
      - "8000:8000"
    volumes:
      - ./prompts:/app/prompts:ro
      # Modèles HF (embedding + cross-encoder) téléchargés au premier démarrage,
      # persistés pour survivre aux recreate du conteneur.
      - hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag_network
      - internal

  # ──────────────────────────────────────────────────────────────────
  # Frontend Streamlit
  # ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rag-frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://agent-api:8000
    depends_on:
      agent-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

# ──────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────
volumes:
  models_cache:
    name: rag_models_cache
  hf_cache:
    name: rag_hf_cache

# ──────────────────────────────────────────────────────────────────
# Réseaux
# ──────────────────────────────────────────────────────────────────
networks:
  rag_network:
    external: true   # Réseau créé par rag-ingestion-pipeline
  internal:
    driver: bridge
